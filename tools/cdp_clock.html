<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>CDP capture-delay probe</title>
<style>
  html, body { margin: 0; background: #111; color: #0f0;
    font-family: "Menlo", monospace; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 24px; padding: 10px 16px; }
  #wall { font-size: 64px; font-weight: bold; color: #0ff; }
  #wallLabel, #vidLabel { font-size: 20px; color: #888; }
  video { width: 1100px; height: 619px; background: #000; display: block;
    margin: 0 16px; border: 2px solid #333; }
  #vid { font-size: 40px; color: #ff0; }
  .hint { font-size: 16px; color: #666; padding: 4px 16px; max-width: 1100px; }
</style>
</head>
<body>
  <!-- Probe for where the casting A/V skew comes from. Two independent clocks
       are on screen at once:

       1) #wall  - a DOM millisecond clock (real browser "now"). Compare it to
          your real Chrome window's clock to see how stale the WHOLE captured
          image is (DOM/compositor path).

       2) the <video> shows ffmpeg testsrc's built-in timecode (the media frame
          actually on screen), and #vid mirrors what requestVideoFrameCallback
          says the browser is *currently presenting*. In the real window these
          match. If the CDP capture shows #vid ahead of the video's own visible
          timecode, the <video> layer is being read back late by the screencast
          - which would be the source of the ~1s audio-ahead skew. -->
  <div class="row">
    <div>
      <div id="wallLabel">DOM wall clock (real browser now)</div>
      <div id="wall">--:--:--.---</div>
    </div>
  </div>
  <video id="v" src="timecode_clip.mp4" autoplay loop muted playsinline></video>
  <div class="row">
    <div>
      <div id="vidLabel">rVFC says &lt;video&gt; is presenting mediaTime =</div>
      <div id="vid">-.---</div>
    </div>
  </div>
  <div class="hint">
    Compare the yellow number (what the browser THINKS the video shows) with the
    timecode burned into the video picture above. A gap = the video layer is
    delayed in the CDP capture.
  </div>
<script>
  const wall = document.getElementById("wall");
  const vid = document.getElementById("vid");
  const v = document.getElementById("v");

  function pad(n, w) { return String(n).padStart(w, "0"); }
  function fmtClock(d) {
    return pad(d.getHours(), 2) + ":" + pad(d.getMinutes(), 2) + ":" +
      pad(d.getSeconds(), 2) + "." + pad(d.getMilliseconds(), 3);
  }
  function tick() {
    wall.textContent = fmtClock(new Date());
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // requestVideoFrameCallback reports the mediaTime of the frame just handed to
  // the compositor — i.e. what the browser believes is on screen right now.
  function onFrame(_now, metadata) {
    vid.textContent = metadata.mediaTime.toFixed(3);
    v.requestVideoFrameCallback(onFrame);
  }
  if ("requestVideoFrameCallback" in HTMLVideoElement.prototype) {
    v.requestVideoFrameCallback(onFrame);
  } else {
    vid.textContent = "(rVFC unsupported)";
  }
  v.play().catch(() => {});
</script>
</body>
</html>
